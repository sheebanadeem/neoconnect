<!DOCTYPE html>
<html>
<head>
<title>NeoConnect Login</title>
<style>
body{
 background:#0b0b0b;
 color:white;
 font-family:Arial;
 display:flex;
 justify-content:center;
 align-items:center;
 height:100vh;
}

.container{
 background:#111;
 padding:30px;
 border-radius:10px;
 width:300px;
}

input{
 width:100%;
 padding:10px;
 margin:10px 0;
}

button{
 width:100%;
 padding:10px;
 background:#3b82f6;
 border:none;
 color:white;
 cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<h2>NeoConnect Login</h2>

<form id="loginForm">

<input type="email" id="email" placeholder="Email" required>

<input type="password" id="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

<p id="error"></p>

</div>

<script src="login.js"></script>

</body>
</html>
